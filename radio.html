<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rádio</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="assets/radionobg.png" type="image/png">
</head>
<body>

    <div id="setup">
        <p>Fique atento ao rádio. Ele tem o costume de tocar sozinho...</p>
        <button class="ligar-btn" onclick="iniciarRadio()">LIGAR RÁDIO</button>
    </div>

    <div id="radio-player" style="display:none;">
        <img src="assets/radio.gif" alt="Rádio">
        <div id="status">Sintonizado...</div>
    </div>

    <audio id="audioChiado" src="assets/chiado.mp3" loop></audio>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script>
        // COLE SEU CONFIG DO FIREBASE AQUI (O mesmo da outra página)
        const firebaseConfig = {
            apiKey: "AIzaSyBTqTS7QckZQTbNElUlgfWufUZgZm-7wXg",
            authDomain: "radiorpg-67845.firebaseapp.com",
            databaseURL: "https://radiorpg-67845-default-rtdb.firebaseio.com",
            projectId: "radiorpg-67845",
            storageBucket: "radiorpg-67845.firebasestorage.app",
            messagingSenderId: "268781658436",
            appId: "1:268781658436:web:995e8460dd1c8c80edb711"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const audio = document.getElementById('audioChiado');

        function iniciarRadio() {
            document.getElementById('setup').style.display = 'none';
            document.getElementById('radio-player').style.display = 'block';
            
            // Dá o play mudo só para o navegador liberar o áudio
            audio.volume = 0;
            audio.play().catch(e => console.log("Aguardando interação"));

            // Começa a escutar o Firebase em tempo real
            database.ref('radio/nivel').on('value', (snapshot) => {
                const nivel = snapshot.val();
                
                if (nivel === 0) {
                    audio.volume = 0;
                    document.getElementById('status').innerText = "Sintonizado... (Silêncio)";
                    document.getElementById('status').style.color = "#555";
                } else if (nivel === 1) {
                    audio.volume = 0.25; // Chiado Baixo
                    document.getElementById('status').innerText = "⚠️ CHIADO DETECTADO";
                    document.getElementById('status').style.color = "#ef6c00";
                } else if (nivel === 2) {
                    audio.volume = 0.9; // Chiado Alto
                    document.getElementById('status').innerText = "🚨 PERIGO IMINENTE";
                    document.getElementById('status').style.color = "#c62828";
                }
            });
        }
    </script>

    <button id="adminBtn" style="background-color: #999999;">┼</button>
    <div id="loginModal" class="modal">

        <script>
            const modal=document.getElementById("loginModal");

            document.getElementById("adminBtn").onclick = () => {

                modal.style.display="flex";

            }

            modal.onclick = (e) => {
                if (e.target === modal) {
                    modal.style.display = "none";
                }
            };

            function loginMestre(){

                const senha=document
                .getElementById("senha")
                .value;

                if(senha==="retaliação"){

                    location.href="mestre.html";

                }

                else{

                    alert("Senha incorreta");

                }
            }
    </script>

    <div class="loginBox">

        <h2>Acesso do Mestre</h2>

        <input
            id="senha"
            type="password"
            placeholder="Só o mestre sabe a senha 😝">

        <button onclick="loginMestre()">
            Entrar
        </button>

    </div>

    </div>

    <button id="menuFab">☰</button>

    <div id="menu">

    <div class="slot"><a href="/radio.html">📻 Rádio</a></div>

    <div class="slot">Vazio</div>

    <div class="slot">⚔️ Site da Ordem</div>

    <div class="slot">Vazio</div>

    <div class="slot">Vazio</div>

    <div class="slot"><a href="/index.html">🌐 Página Inicial</a></div>

    <script>
        const menu = document.getElementById("menu");
        const menuFab = document.getElementById("menuFab");

        menuFab.onclick = (e) => {

            e.stopPropagation();

            menu.style.display =
                menu.style.display === "flex"
                ? "none"
                : "flex";

        };

        // Impede que clicar dentro do menu o feche
        menu.onclick = (e) => {
            e.stopPropagation();
        };

        // Fecha ao clicar em qualquer outro lugar
        document.addEventListener("click", () => {

            menu.style.display = "none";

        });
    </script>



</body>
</html>
