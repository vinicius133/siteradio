<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Mestre - Rádio SH2</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="assets/retaliacao.png">
    <style>
        body{
            background:
            linear-gradient(rgba(0,0,0,.90),rgba(0,0,0,.90)),
            url("assets/wppcyber.jpg");

            background-size:cover;
            background-position:center;

            height:100vh;

            color:#d8d8d8;
        }
    </style>
</head>
<body>
    <h2>Controle do Rádio</h2>

    <p style="font-size: large;">Intensidade do chiado</p>

    <input
        type="range"
        id="sliderRadio"
        min="0"
        max="100"
        value="0"
        oninput="mudarDistancia(this.value)"
    >

    <button onclick="estourarRadio()" class="burstBtn">
    ⚠ ESTOURAR RÁDIO
    </button>

    <p style="font-size: larger;">
        Intensidade:
        <span id="valorSlider">0%</span>
    </p>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script>
        // COLE SEU CONFIG DO FIREBASE AQUI
        const firebaseConfig = {
            apiKey: "AIzaSyBTqTS7QckZQTbNElUlgfWufUZgZm-7wXg",
            authDomain: "radiorpg-67845.firebaseapp.com",
            databaseURL: "https://radiorpg-67845-default-rtdb.firebaseio.com",
            projectId: "radiorpg-67845",
            storageBucket: "radiorpg-67845.firebasestorage.app",
            messagingSenderId: "268781658436",
            appId: "1:268781658436:web:995e8460dd1c8c80edb711"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function mudarDistancia(valor){

            document.getElementById("valorSlider").textContent = valor + "%";

            database.ref("radio/nivel").set(Number(valor));

        }

        database.ref("radio/nivel").on("value",(snap)=>{

            const valor = snap.val() ?? 0;

            document.getElementById("sliderRadio").value = valor;

            document.getElementById("valorSlider").textContent = valor + "%";

        });

        function estourarRadio(){

            const slider = document.getElementById("sliderRadio");

            const valorAnterior = Number(slider.value);

            // Volume máximo
            database.ref("radio/nivel").set(180);

            // // Após 2 segundos volta ao valor anterior
            // setTimeout(() => {

            //     database.ref("radio/nivel").set(valorAnterior);

            // }, 1500);

        }
    </script>

    <button id="menuFab">☰</button>

    <div id="menu">

    <div class="slot"><a href="radio.html">📻 Rádio</a></div>

    <div class="slot">Vazio</div>

    <div class="slot"><a href="conexao.html">⚔️ Site da Ordem</a></div>


    <div class="slot">Vazio</div>

    <div class="slot"><a href="https://vinicius133.github.io/siteradio/">🌐 Página Inicial</a></div>

    <script>
        const menu = document.getElementById("menu");
        const menuFab = document.getElementById("menuFab");

        menuFab.onclick = (e) => {

            e.stopPropagation();

            menu.style.display =
                menu.style.display === "flex"
                ? "none"
                : "flex";

        };

        // Impede que clicar dentro do menu o feche
        menu.onclick = (e) => {
            e.stopPropagation();
        };

        // Fecha ao clicar em qualquer outro lugar
        document.addEventListener("click", () => {

            menu.style.display = "none";

        });
    </script>

</div>

</body>
</html>
