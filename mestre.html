</head>
<body>
    <h2>Controle do Rádio</h2>
    <p>Selecione a proximidade do monstro:</p>
    
    <button class="btn-0" onclick="mudarDistancia(0)">🟢 Longe (Silêncio)</button>
    <button class="btn-1" onclick="mudarDistancia(1)">🟡 Perto (Chiado Baixo)</button>
    <button class="btn-2" onclick="mudarDistancia(2)">🔴 Muito Perto (Chiado Alto)</button>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script>
        // COLE SEU CONFIG DO FIREBASE AQUI
        const firebaseConfig = {
            apiKey: "AIzaSyBTqTS7QckZQTbNElUlgfWufUZgZm-7wXg",
            authDomain: "radiorpg-67845.firebaseapp.com",
            databaseURL: "https://radiorpg-67845-default-rtdb.firebaseio.com",
            projectId: "radiorpg-67845",

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function mudarDistancia(nivel) {
            database.ref('radio/nivel').set(nivel);

    <button id="menuFab">☰</button>

    <div id="menu">

    <div class="slot"><a href="/radio.html">📻 Rádio</a></div>

    <div class="slot">Vazio</div>

    <div class="slot"><a href="siteradio/index.html">🌐 Página Inicial</a></div>

    <script>
        const menu = document.getElementById("menu");
        const menuFab = document.getElementById("menuFab");

        menuFab.onclick = (e) => {

            e.stopPropagation();

            menu.style.display =
                menu.style.display === "flex"
                ? "none"
                : "flex";

        };

        // Impede que clicar dentro do menu o feche
        menu.onclick = (e) => {
            e.stopPropagation();
        };

        // Fecha ao clicar em qualquer outro lugar
        document.addEventListener("click", () => {

            menu.style.display = "none";

        });
    </script>

</div>
